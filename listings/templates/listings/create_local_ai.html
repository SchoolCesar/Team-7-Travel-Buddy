{% extends "base.html" %}

{% block title %}Post a Trip | Travel Buddy{% endblock %}

{% block content %}
<h1 class="mb-4">Post a Trip</h1>

<form method="post" class="card p-4">
  {% csrf_token %}

  {{ form.as_p }}

  <button type="submit" class="btn btn-primary">Post Trip</button>
  <a href="{% url 'trip_browse' %}" class="btn btn-secondary mt-2">Cancel</a>
</form>
{% endblock %}
